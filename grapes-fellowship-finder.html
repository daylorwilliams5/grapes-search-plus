<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GRAPES Search+ | UCLA Division of Graduate Education</title>
<style>
:root {
  --blue:#2774AE; --blue-dk:#1a5c8a; --gold:#FFD100; --navy:#003B5C;
  --bg:#F2F5F9; --surface:#fff; --text:#111827; --t2:#4B5563; --t3:#9CA3AF;
  --border:#E5EAF0; --red:#DC2626; --red-bg:#FEF2F2;
  --green:#16A34A; --green-bg:#F0FDF4; --amber:#B45309; --amber-bg:#FFFBEB;
  --r:8px; --sh0:0 1px 3px rgba(0,0,0,.08); --sh:0 4px 16px rgba(0,59,92,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}

/* NAV */
nav{background:var(--navy);height:46px;padding:0 32px;display:flex;align-items:center;gap:0}
.nu{font-size:13px;font-weight:700;color:#fff;letter-spacing:.3px;padding-right:16px;border-right:1px solid rgba(255,255,255,.2)}
.nd{font-size:12px;color:rgba(255,255,255,.65);padding-left:16px}

/* HEADER */
.hdr{background:var(--blue);color:#fff}
.hi{max-width:1320px;margin:0 auto;padding:26px 32px 0}
.ht{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:20px}
.ht h1{font-size:22px;font-weight:800;letter-spacing:-.3px;margin-bottom:3px}
.ht h1 em{color:var(--gold);font-style:normal}
.ht p{font-size:13px;opacity:.72;max-width:440px}
.stats{display:flex;gap:1px;background:rgba(255,255,255,.15);border-radius:var(--r);overflow:hidden;flex-shrink:0;align-self:flex-start}
.stat{padding:9px 18px;text-align:center;background:rgba(255,255,255,.08)}
.stat .n{font-size:21px;font-weight:800;line-height:1}
.stat .l{font-size:10px;opacity:.6;text-transform:uppercase;letter-spacing:.7px;margin-top:2px}
.sw{background:rgba(0,0,0,.15);padding:13px 0;margin:0 -32px;padding-left:32px;padding-right:32px}
.si{max-width:1320px;margin:0 auto;display:flex;align-items:center;gap:10px}
.sf{flex:1;max-width:560px;position:relative}
.sf input{width:100%;padding:10px 34px 10px 14px;border-radius:var(--r);border:1.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.95);font-size:14px;color:var(--text);outline:none;transition:border .15s}
.sf input:focus{border-color:var(--gold)}
.sf input::placeholder{color:#9CA3AF}
.cx{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:13px;display:none;padding:2px}
.cx.show{display:block}
.sh{font-size:12px;color:rgba(255,255,255,.55)}

/* TABS */
.tb{background:var(--surface);border-bottom:1px solid var(--border)}
.ti{max-width:1320px;margin:0 auto;padding:0 32px;display:flex;align-items:center;gap:4px;height:42px;overflow-x:auto}
.tab{padding:5px 13px;border-radius:20px;border:1.5px solid transparent;background:none;font-size:13px;font-weight:500;cursor:pointer;color:var(--t2);white-space:nowrap;transition:all .12s;flex-shrink:0}
.tab:hover{background:var(--bg);color:var(--text)}
.tab.on{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}
/* SEARCH CHIPS */
.sq{max-width:1320px;margin:8px auto 0;display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding-bottom:2px}
.sql{font-size:12px;color:rgba(255,255,255,.5);margin-right:2px;white-space:nowrap}
.sqb{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);padding:4px 11px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .12s;white-space:nowrap}
.sqb:hover{background:rgba(255,255,255,.25);color:#fff}
.sqb.on{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:600}
/* ACTIVE TOGGLE */
.atog{padding:5px 12px;border-radius:20px;border:1.5px solid var(--blue);background:var(--blue);color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.atog::before{content:'✓ '}
.atog.off{background:transparent;color:var(--t2);border-color:var(--border)}
.atog.off::before{content:''}

/* LAYOUT */
.lay{max-width:1320px;margin:20px auto;padding:0 32px;display:flex;gap:20px;align-items:flex-start}
.sb{width:212px;flex-shrink:0;display:flex;flex-direction:column;gap:11px}
.pnl{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh0);border:1px solid var(--border);padding:14px}
.pl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--t3);margin-bottom:9px}
.fb{display:flex;justify-content:space-between;align-items:center;width:100%;padding:6px 8px;border-radius:6px;border:none;background:none;font-size:13px;cursor:pointer;color:var(--t2);text-align:left;margin-bottom:1px;transition:background .12s}
.fb:hover{background:var(--bg);color:var(--text)}
.fb.on{background:var(--blue);color:#fff;font-weight:600}
.fb .n{font-size:11px;font-weight:600;padding:1px 6px;border-radius:10px;background:rgba(0,0,0,.07)}
.fb.on .n{background:rgba(255,255,255,.22)}
.sr{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.sr:last-child{border:none}
.sl{color:var(--t2);font-weight:500}
.sg{font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px}
.sg-c{background:#DCFCE7;color:#15803D}
.sg-d{background:#FEF3C7;color:#92400E}
.sg-u{background:#F1F5F9;color:#64748B}

/* CONTENT */
.ct{flex:1;min-width:0}
.rb{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.rb .rc{font-size:13px;color:var(--t2)}
.rb .rc strong{color:var(--text)}
.rb select{padding:5px 10px;border-radius:6px;border:1.5px solid var(--border);font-size:12px;background:var(--surface);cursor:pointer;color:var(--text);outline:none}

/* CARDS */
.gc{display:flex;flex-direction:column;gap:7px}
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh0);border:1px solid var(--border);border-left:4px solid var(--blue);overflow:hidden;transition:box-shadow .14s}
.card:hover{box-shadow:var(--sh)}
.card.pc{border-left-color:var(--amber)}
.card.exp .body{display:block}
.card.exp .cv{transform:rotate(180deg)}

.ch{display:flex;align-items:flex-start;gap:11px;padding:13px 15px;cursor:pointer;user-select:none}
.cm{flex:1;min-width:0}
.ct2{font-size:14px;font-weight:700;color:var(--navy);line-height:1.35;margin-bottom:2px}
.ca{font-size:12px;color:var(--t2)}
.cs{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.bgs{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end}
.bg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap;letter-spacing:.15px}
.b-fall{background:#FFF7ED;color:#C2410C;border:1px solid #FED7AA}
.b-winter{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
.b-spring{background:#F0FDF4;color:#15803D;border:1px solid #BBF7D0}
.b-summer{background:#FDF4FF;color:#7E22CE;border:1px solid #E9D5FF}
.b-open{background:#F8FAFC;color:#475569;border:1px solid #CBD5E1}
.b-unk{background:#F9FAFB;color:#6B7280;border:1px solid #E5E7EB}
.b-pub{background:#F0FDF4;color:#15803D;border:1px solid #BBF7D0}
.b-pnd{background:#FFFBEB;color:#92400E;border:1px solid #FDE68A}
.b-typ{background:#EFF6FF;color:#1e40af;border:1px solid #BFDBFE}
.cv{color:var(--t3);transition:transform .2s;flex-shrink:0;margin-top:1px}

.dr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:0 15px 10px;margin-top:-3px}
.dp{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px}
.df{background:var(--green-bg);color:var(--green)}
.dd{background:var(--red-bg);color:var(--red)}
.dn{background:var(--bg);color:var(--t3)}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.rn{font-size:11px;color:var(--t3)}
.ap{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;background:var(--green-bg);color:var(--green);border:1px solid #BBF7D0}

.ps{background:var(--amber-bg);border-top:1px solid #FDE68A;padding:6px 15px;font-size:11px;color:var(--amber);font-weight:500}

.body{display:none;border-top:1px solid var(--border)}
.bd{padding:13px 15px 10px;font-size:13px;color:var(--t2);line-height:1.65;border-bottom:1px solid var(--border)}
.bf{display:grid;grid-template-columns:repeat(3,1fr);gap:9px 18px;padding:11px 15px;border-bottom:1px solid var(--border)}
.fi .fk{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);margin-bottom:2px}
.fi .fv{font-size:13px;color:var(--text)}
.ba{display:flex;justify-content:flex-end;padding:9px 15px 11px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:700;text-decoration:none;cursor:pointer;border:none;transition:all .12s;background:var(--blue);color:#fff}
.btn:hover{background:var(--blue-dk)}

.empty{text-align:center;padding:60px 20px;color:var(--t2)}
.empty svg{opacity:.35;margin-bottom:10px}
.empty p{font-size:14px}

.pg{display:flex;gap:4px;justify-content:center;margin-top:18px;align-items:center}
.pb{padding:6px 11px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;font-weight:600;color:var(--text);transition:all .12s}
.pb:hover{border-color:var(--blue);color:var(--blue)}
.pb.on{background:var(--blue);border-color:var(--blue);color:#fff}
.pb:disabled{opacity:.35;cursor:default;pointer-events:none}

mark{background:#FEF08A;padding:0 1px;border-radius:2px}

@media(max-width:900px){
  nav,.hi,.sw,.ti,.lay{padding-left:14px;padding-right:14px}
  .sw{margin:0 -14px}
  .lay{flex-direction:column}
  .sb{width:100%}
  .bf{grid-template-columns:1fr 1fr}
  .stats{display:none}
}
</style>
</head>
<body>

<nav><span class="nu">UCLA</span><span class="nd">Division of Graduate Education</span></nav>

<div class="hdr">
<div class="hi">
  <div class="ht">
    <div>
      <h1>GRAPES <em>Search+</em></h1>
      <p>Graduate fellowship, grant &amp; award database — curated and verified for UCLA DGE.</p><p style="font-size:11px;opacity:.5;margin-top:4px">Created by Daylor Williams</p>

    <div class="stats">
      <div class="stat"><div class="n" id="s1">—</div><div class="l">Fellowships</div></div>

  </div>
  <div class="sw"><div class="si">

  </div></div>
</div>
</div>

<div class="tb"><div class="ti">

  <button class="tab" data-f="Winter" onclick="setTab(this,'Winter')">Winter</button>

  <button class="tab" data-f="Summer" onclick="setTab(this,'Summer')">Summer</button>
  <button class="tab" data-f="Open/Rolling" onclick="setTab(this,'Open/Rolling')">Open / Rolling</button>
</div></div>

<div class="lay">
<aside class="sb">
  <div class="pnl">
    <div class="pl">Seasonal Status</div>
    <div id="sw2"></div>
  </div>
  <div class="pnl">
    <div class="pl">Season</div>
    <button class="fb on" data-s="All" onclick="fS('All')">All Seasons <span class="n" id="cn-All">0</span></button>
    <button class="fb" data-s="Fall" onclick="fS('Fall')">Fall <span class="n" id="cn-Fall">0</span></button>

    <button class="fb" data-s="Spring" onclick="fS('Spring')">Spring <span class="n" id="cn-Spring">0</span></button>
    <button class="fb" data-s="Summer" onclick="fS('Summer')">Summer <span class="n" id="cn-Summer">0</span></button>
    <button class="fb" data-s="Open/Rolling" onclick="fS('Open/Rolling')">Open / Rolling <span class="n" id="cn-Open">0</span></button>
  </div>

  <div class="pnl">
    <div class="pl">Award Type</div>
    <button class="fb on" data-at="All" onclick="fAt('All')">All Types <span class="n" id="an-All">0</span></button>
    <button class="fb" data-at="Postdoctoral Fellowship" onclick="fAt('Postdoctoral Fellowship')">Postdoctoral <span class="n" id="an-Post">0</span></button>
    <button class="fb" data-at="Dissertation Fellowship" onclick="fAt('Dissertation Fellowship')">Dissertation <span class="n" id="an-Diss">0</span></button>
    <button class="fb" data-at="Research Grant" onclick="fAt('Research Grant')">Research Grant <span class="n" id="an-Res">0</span></button>
    <button class="fb" data-at="Internship" onclick="fAt('Internship')">Internship <span class="n" id="an-Int">0</span></button>
    <button class="fb" data-at="Travel Grant" onclick="fAt('Travel Grant')">Travel Grant <span class="n" id="an-Trav">0</span></button>
    <button class="fb" data-at="Scholarship" onclick="fAt('Scholarship')">Scholarship <span class="n" id="an-Sch">0</span></button>
  </div>
  <div class="pnl">
    <div class="pl">Field of Study</div>
    <button class="fb on" data-fd="All" onclick="fFd('All')">All Fields <span class="n" id="fn-All">0</span></button>
    <button class="fb" data-fd="social" onclick="fFd('social')">Social Sciences <span class="n" id="fn-soc">0</span></button>
    <button class="fb" data-fd="stem" onclick="fFd('stem')">STEM <span class="n" id="fn-stem">0</span></button>
    <button class="fb" data-fd="humanities" onclick="fFd('humanities')">Humanities <span class="n" id="fn-hum">0</span></button>
    <button class="fb" data-fd="health" onclick="fFd('health')">Health Sciences <span class="n" id="fn-hlt">0</span></button>
    <button class="fb" data-fd="arts" onclick="fFd('arts')">Arts &amp; Culture <span class="n" id="fn-art">0</span></button>
    <button class="fb" data-fd="law" onclick="fFd('law')">Law &amp; Policy <span class="n" id="fn-law">0</span></button>
    <button class="fb" data-fd="education" onclick="fFd('education')">Education <span class="n" id="fn-edu">0</span></button>
    <button class="fb" data-fd="intl" onclick="fFd('intl')">International <span class="n" id="fn-int">0</span></button>
    <button class="fb" data-fd="general" onclick="fFd('general')">Open to All Fields <span class="n" id="fn-gen">0</span></button>
  </div>
</aside>

<div class="ct">
  <div class="rb">
    <div class="rc" id="rc-wrap"><strong id="rc">0</strong> <span id="rc-label">results</span></div>
    <button class="atog" id="atog" onclick="togActive()">Showing active only</button>
    <select id="ss" onchange="render()">
      <option value="deadline">Active deadlines first</option>
      <option value="alpha">Name: A–Z</option>
      <option value="status">Published first</option>
    </select>
  </div>
  <div class="gc" id="gc"></div>
  <div class="pg" id="pg"></div>
</div>
</div>

};
function expand(q){
  const words=q.toLowerCase().split(/\s+/).filter(t=>t.length>2&&!NOISE.has(t));
  const ex=[...words];
  Object.entries(SYNS).forEach(([k,v])=>{
    const hit=words.some(t=>{
      if(k===t||k.startsWith(t)||t.startsWith(k)) return true;
      return v.some(sv=>sv===t||sv.startsWith(t)||t.startsWith(sv.split(' ')[0]));
    });
    if(hit) ex.push(...v);
  });
  return [...new Set(ex)].filter(t=>!NOISE.has(t)&&t.length>2);
}
function score(r,terms){
  if(!terms.length) return 0;
  let s=0;
  const txt={
    title:r.title.toLowerCase(),
    agency:(r.agency1||'').toLowerCase(),
    desc:(r.description||'').toLowerCase(),
    elig:(r.eligibility||'').toLowerCase(),
    type:(r.awardType||'').toLowerCase(),
    ag2:(r.agency2||'').toLowerCase(),
  };
  terms.forEach(t=>{
    let hit=0;
    if(txt.title.includes(t)){s+=8;hit++;}
    if(txt.agency.includes(t)){s+=4;hit++;}
    if(txt.desc.includes(t)){s+=3;hit++;}
    if(txt.elig.includes(t)){s+=3;hit++;}
    if(txt.type.includes(t)){s+=2;hit++;}
    if(txt.ag2.includes(t)){s+=2;hit++;}
    if(hit>1) s+=2; // bonus: term appears in multiple fields
  });
  return s;
}
function hl(txt,terms){
  if(!terms.length||!txt) return txt||'';
  const re=new RegExp('('+terms.map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')','gi');
  return txt.replace(re,'<mark>$1</mark>');
}

function queryToFields(rawQ){
  if(!rawQ) return [];
  const txt=rawQ.toLowerCase();
  return Object.entries(FIELD_PAT).filter(([,p])=>p.test(txt)).map(([k])=>k);
}
function totalScore(r,terms,qFields){
  const ts=score(r,terms);
  const fs=qFields.some(f=>r._fields.includes(f))?3:0;
  return ts+fs;
}
function getFiltered(){
  const terms=q?expand(q):[];
  const qFields=q?queryToFields(q):[];
  const hasQuery=terms.length||qFields.length;
  let res=DATA.filter(r=>{
    if(fSeas!=='All'&&r.season!==fSeas) return false;
    if(fStat!=='All'&&r.status!==fStat) return false;
    if(fChip!=='all'&&r.season!==fChip) return false;
    if(fAward!=='All'){
      const at=(r.awardType||'').toLowerCase();
      if(!at.includes(fAward.toLowerCase())) return false;
    }
    if(fField!=='All'){
      if(!r._fields.includes(fField)&&!r._fields.includes('general')) return false;
    }
    if(fActive&&r.sortTier===2) return false;
    if(hasQuery) return totalScore(r,terms,qFields)>0;
    return true;
  });
  const sv=document.getElementById('ss')?.value||'deadline';
  if(q&&hasQuery){
    res.sort((a,b)=>{
      const pubA=a.status==='Published'?0:1;
      const pubB=b.status==='Published'?0:1;
      if(pubA!==pubB) return pubA-pubB;
      return totalScore(b,terms,qFields)-totalScore(a,terms,qFields);
    });
  } else if(sv==='deadline'){
    res.sort((a,b)=>a.sortTier!==b.sortTier?a.sortTier-b.sortTier:a.deadlineSort.localeCompare(b.deadlineSort));
  } else if(sv==='alpha'){
    res.sort((a,b)=>a.title.localeCompare(b.title));
  } else {
    res.sort((a,b)=>{
      if(a.status==='Published'&&b.status!=='Published') return -1;
      if(b.status==='Published'&&a.status!=='Published') return 1;
      return a.sortTier-b.sortTier||a.deadlineSort.localeCompare(b.deadlineSort);
    });
  }
  return res;
}

function uc(res){
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  const terms=q?expand(q):[];
  // Faceted counts: each dimension counted against all OTHER active filters
  const base=(exSeas,exStat,exAward,exField)=>DATA.filter(r=>{
    if(!exSeas&&fSeas!=='All'&&r.season!==fSeas) return false;
    if(!exStat&&fStat!=='All'&&r.status!==fStat) return false;
    if(!exAward&&fAward!=='All'){const at=(r.awardType||'').toLowerCase();if(!at.includes(fAward.toLowerCase())) return false;}
    if(!exField&&fField!=='All'){if(!r._fields.includes(fField)&&!r._fields.includes('general')) return false;}
    if(fActive&&r.sortTier===2) return false;
    if(terms.length) return score(r,terms)>0;
    return true;
  });
  const bSeas=base(true,false,false,false);
  const bStat=base(false,true,false,false);
  const bAward=base(false,false,true,false);
  const bField=base(false,false,false,true);
  set('cn-All',bSeas.length);
  ['Fall','Winter','Spring','Summer'].forEach(s=>set('cn-'+s,bSeas.filter(r=>r.season===s).length));
  set('cn-Open',bSeas.filter(r=>r.season==='Open/Rolling').length);
  set('sn-All',bStat.length);
  set('sn-Pub',bStat.filter(r=>r.status==='Published').length);
  set('rc',res.length);
  set('an-All',bAward.length);
  set('an-Post',bAward.filter(r=>(r.awardType||'').includes('Postdoctoral')).length);
  set('an-Diss',bAward.filter(r=>(r.awardType||'').includes('Dissertation')).length);
  set('an-Res',bAward.filter(r=>(r.awardType||'')===('Research Grant')).length);
  set('an-Int',bAward.filter(r=>(r.awardType||'').includes('Internship')).length);
  set('an-Trav',bAward.filter(r=>(r.awardType||'').includes('Travel')).length);
  set('an-Sch',bAward.filter(r=>(r.awardType||'').includes('Scholarship')).length);
  // Field counts
  const fd=bField;
  set('fn-All',fd.length);
  set('fn-soc',fd.filter(r=>r._fields.includes('social')||r._fields.includes('general')).length);
  set('fn-stem',fd.filter(r=>r._fields.includes('stem')||r._fields.includes('general')).length);
  set('fn-hum',fd.filter(r=>r._fields.includes('humanities')||r._fields.includes('general')).length);
  set('fn-hlt',fd.filter(r=>r._fields.includes('health')||r._fields.includes('general')).length);
  set('fn-art',fd.filter(r=>r._fields.includes('arts')||r._fields.includes('general')).length);
  set('fn-law',fd.filter(r=>r._fields.includes('law')||r._fields.includes('general')).length);
  set('fn-edu',fd.filter(r=>r._fields.includes('education')||r._fields.includes('general')).length);
  set('fn-int',fd.filter(r=>r._fields.includes('intl')||r._fields.includes('general')).length);
  set('fn-gen',fd.filter(r=>r._fields.includes('general')).length);
}

function sbc(s){return({'Fall':'b-fall','Winter':'b-winter','Spring':'b-spring','Summer':'b-summer','Open/Rolling':'b-open'})[s]||'b-unk';}

function render(){
  const res=getFiltered();
  uc(res);
  const total=Math.max(1,Math.ceil(res.length/PG));
  if(pg>total) pg=1;
  const page=res.slice((pg-1)*PG,pg*PG);
  const terms=q?expand(q):[];
  const el=document.getElementById('gc');
  const lbl=document.getElementById('rc-label');
  if(lbl) lbl.textContent=q?`results for "${q}"`:terms.length?'results':'fellowships';


  if(!page.length){
    el.innerHTML='<div class="empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>No fellowships match your search.<br/>Try different keywords or clear your filters.</p></div>';
  } else {
    el.innerHTML=page.map((r,i)=>{
      const isPend=r.status==='Pending';
      const cls='card'+(isPend?' pc':'');
      let dlp;
      if(!r.deadline) dlp='<span class="dp dn"><span class="dot"></span>Deadline not listed</span>';
      else if(r.deadlinePassed) dlp=`<span class="dp dd"><span class="dot"></span>Deadline passed &mdash; ${r.deadline}</span>`;
      else dlp=`<span class="dp df"><span class="dot"></span>${r.deadline}</span>`;
      const amt=r.amount?`<span class="ap">${r.amount}</span>`:'';
      const pend=isPend?'<div class="ps">Needs verification &mdash; deadline and availability unconfirmed</div>':'';
      const ag=r.agency2?`${r.agency1} &amp; ${r.agency2}`:r.agency1;
      const tbg=r.awardType?`<span class="bg b-typ">${r.awardType}</span>`:'';
      const desc=r.description?`<div class="bd">${r.description}</div>`:'';
      const eligRow=r.eligibility?`<div class="fi" style="grid-column:1/-1"><div class="fk">Eligibility</div><div class="fv">${r.eligibility}</div></div>`:'';
      const fields=`<div class="bf">
        <div class="fi"><div class="fk">Primary Agency</div><div class="fv">${r.agency1||'—'}</div></div>
        <div class="fi"><div class="fk">Award Type</div><div class="fv">${r.awardType||'—'}</div></div>
        <div class="fi"><div class="fk">Award Amount</div><div class="fv">${r.amount||'—'}</div></div>
        <div class="fi"><div class="fk">Season</div><div class="fv">${r.season}</div></div>
        <div class="fi"><div class="fk">Deadline</div><div class="fv">${r.deadline||'Not listed'}</div></div>
        ${r.agency2?`<div class="fi"><div class="fk">Co-Sponsor</div><div class="fv">${r.agency2}</div></div>`:'<div></div>'}
        ${eligRow}
      </div>`;
      return `<div class="${cls}" id="c${i}">
        <div class="ch" onclick="tog(${i})">
          <div class="cm"><div class="ct2">${r.title}</div><div class="ca">${ag}</div></div>
          <div class="cs">
            <div class="bgs">
              <span class="bg ${sbc(r.season)}">${r.season}</span>
              ${tbg}
              <span class="bg ${isPend?'b-pnd':'b-pub'}">${isPend?'Needs Review':'Published'}</span>
            </div>
            <svg class="cv" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
          </div>
        </div>
        <div class="dr">${dlp}${amt}${r.id?`<span class="rn">Record #${r.id}</span>`:''}</div>
        ${pend}
        <div class="body">${desc}${fields}
          <div class="ba"><a class="btn" href="${r.officialUrl}" target="_blank" rel="noopener">Visit Official Page <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a></div>
        </div>
      </div>`;
    }).join('');
  }
  const pg_el=document.getElementById('pg');
  if(total<=1){pg_el.innerHTML='';return;}
  let ph=`<button class="pb" onclick="goP(${pg-1})" ${pg===1?'disabled':''}>Prev</button>`;
  for(let i=1;i<=total;i++){
    if(i===1||i===total||Math.abs(i-pg)<=2) ph+=`<button class="pb ${i===pg?'on':''}" onclick="goP(${i})">${i}</button>`;
    else if(Math.abs(i-pg)===3) ph+=`<span style="color:var(--t3);padding:0 2px">…</span>`;
  }
  ph+=`<button class="pb" onclick="goP(${pg+1})" ${pg===total?'disabled':''}>Next</button>`;
  pg_el.innerHTML=ph;
}

function tog(i){
  const c=document.getElementById('c'+i);
  const was=c.classList.contains('exp');
  document.querySelectorAll('.card.exp').forEach(x=>x.classList.remove('exp'));
  if(!was) c.classList.add('exp');
}
function goP(p){
  const res=getFiltered(),t=Math.ceil(res.length/PG);
  if(p<1||p>t) return;
  pg=p;render();window.scrollTo({top:0,behavior:'smooth'});
}
function fS(s){
  fSeas=s;fChip=s==='All'?'all':s;pg=1;
  document.querySelectorAll('[data-s]').forEach(b=>b.classList.toggle('on',b.dataset.s===s));
  document.querySelectorAll('[data-f]').forEach(t=>t.classList.toggle('on',t.dataset.f===(s==='All'?'all':s)));
  render();
}
function fSt(s){
  fStat=s;pg=1;
  document.querySelectorAll('[data-st]').forEach(b=>b.classList.toggle('on',b.dataset.st===s));
  render();
}
function fAt(s){
  fAward=s;pg=1;
  document.querySelectorAll('[data-at]').forEach(b=>b.classList.toggle('on',b.dataset.at===s));
  render();
}
function fFd(s){
  fField=s;pg=1;
  document.querySelectorAll('[data-fd]').forEach(b=>b.classList.toggle('on',b.dataset.fd===s));
  render();
}
function togActive(){
  fActive=!fActive;pg=1;
  const btn=document.getElementById('atog');
  btn.textContent=fActive?'Showing active only':'Showing all deadlines';
  btn.classList.toggle('off',!fActive);
  render();
}
function srch(qStr){
  const inp=document.getElementById('si');
  inp.value=qStr;
  q=qStr;pg=1;
  document.getElementById('cx').classList.add('show');
  document.querySelectorAll('.sqb').forEach(b=>b.classList.toggle('on',b.getAttribute('onclick').includes("'"+qStr+"'")));
  render();
}
function setTab(el,f){
  fChip=f;fSeas=f==='all'?'All':f;pg=1;
  document.querySelectorAll('[data-f]').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.querySelectorAll('[data-s]').forEach(b=>b.classList.toggle('on',b.dataset.s===(f==='all'?'All':f)));
  render();
}
function clr(){
  document.getElementById('si').value='';
  q='';pg=1;
  document.getElementById('cx').classList.remove('show');
  document.querySelectorAll('.sqb').forEach(b=>b.classList.remove('on'));
  render();
}
let st;
document.getElementById('si').addEventListener('input',function(){
  clearTimeout(st);
  document.getElementById('cx').classList.toggle('show',this.value.length>0);
  st=setTimeout(()=>{q=this.value.trim();pg=1;render();},220);
});
init();
</script>
